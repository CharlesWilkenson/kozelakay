---
  - name: Ensure Java 17 is installed
    apt:
      name: openjdk-17-jre-headless
      state: present
      update_cache: yes

  - name: Create application directory
    file:
      path: "{{ app_dest_path }}"
      state: directory
      owner: www-data
      group: www-data

  - name: Copy Spring Boot JAR to server
    copy:
      src: "{{ app_jar_source }}"
      dest: "{{ app_dest_path }}/{{ app_name }}.jar"
      mode: '0755'

  - name: Setup Systemd Service
    template:
      src: app_service.j2
      dest: "/etc/systemd/system/{{ app_name }}.service"
    notify: Restart App