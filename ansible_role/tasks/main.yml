---
  - name: Stop and remove the old container
    docker_container:
      name: "{{ app_name }}"
      state: absent

  - name: Pull the latest image
    docker_image:
      name: "{{ image_name }}"
      source: pull

  - name: Run the new container
    docker_container:
      name: "{{ app_name }}"
      image: "{{ image_name }}"
      state: started
      restart_policy: always
      ports:
        - "8083:8080"